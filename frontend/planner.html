<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<title>Study Planner | AI Study Assistant</title>
<link rel='stylesheet' href='styles.css'>
</head>
<body>
<div class='navbar'><div>AI Study Assistant</div><div><a href='dashboard.html'>Dashboard</a><a href='profile.html'>Profile</a><a href='notebook.html'>Notebook</a><a href='ai_assistant.html'>AI Assistant</a><a href='#' id='logout'>Logout</a></div></div>
<div class='container'>
<h1>Study Planner</h1>
<div class='card'>
<h3>Add Task</h3>
<input id='task-title' class='input-field' placeholder='Task title'>
<input id='task-deadline' class='input-field' type='date'>
<select id='task-priority' class='input-field' style="padding:0.8rem 1rem; border-radius:8px;">
  <option value='low'>Priority: Low</option>
  <option value='medium' selected>Priority: Medium</option>
  <option value='high'>Priority: High</option>
</select>
<button class='btn' id='add-task'>Add Task</button>
</div>
<div class='card'>
<h3>Tasks</h3>
<ul id='task-list'></ul>
<div id='task-pagination' style='display:flex; gap:0.5rem; align-items:center; margin-top:1rem;'></div>
</div>
</div>
<script src='app.js'></script>
<script>
requireAuth();initDarkMode();
document.getElementById('logout').onclick = () => { clearToken(); localStorage.removeItem('user'); window.location='index.html'; };
let taskPage = 1;
const taskLimit = 10;

async function loadTasks(){ 
  const res = await apiFetch(`/tasks?page=${taskPage}&limit=${taskLimit}`); 
  const container = document.getElementById('task-list');
  const pagination = document.getElementById('task-pagination');
  if(!res.success){ container.innerHTML = `<li style="color:red;">${res.message}</li>`; pagination.innerHTML=''; return; } 
  const tasks = Array.isArray(res.data.items) ? res.data.items : [];
  container.innerHTML=''; 
  if(tasks.length === 0) { container.innerHTML='<li><em>No tasks yet. Add one to get started!</em></li>'; } else {
    tasks.forEach(task=>{ 
      const li=document.createElement('li'); 
      li.className='card'; 
      li.style.listStyle='none';
      const statusColor = task.status === 'completed' ? '#4caf50' : '#ff9800';
      const priorityColor = task.priority === 'high' ? '#f44336' : task.priority === 'medium' ? '#ff9800' : '#4caf50';
      li.innerHTML=`
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; flex-wrap:wrap; gap:0.5rem;">
          <strong>${task.title}</strong>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <span style="background:${statusColor}; color:white; padding:0.3rem 0.6rem; border-radius:4px; font-size:0.8rem;">${task.status}</span>
            <span style="background:${priorityColor}; color:white; padding:0.3rem 0.6rem; border-radius:4px; font-size:0.8rem;">${task.priority}</span>
          </div>
        </div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.75rem;">
          <button class="btn" onclick="markDone('${task.id}', '${task.status === 'completed' ? 'pending' : 'completed'}')">${task.status === 'completed' ? 'Mark Pending' : 'Mark Complete'}</button>
          <button class="btn" onclick="removeTask('${task.id}')">Delete</button>
        </div>
        <div style="color:#555;">Deadline: ${task.deadline}</div>
      `;
      container.appendChild(li); 
    });
  }
  updateTaskPagination(res.data);
}

function updateTaskPagination(data){
  const pagination = document.getElementById('task-pagination');
  if(!data || data.pages <= 1){ pagination.innerHTML=''; return; }
  pagination.innerHTML = `
    <button class="btn" ${data.page <= 1 ? 'disabled' : ''} onclick="changeTaskPage(-1)">Prev</button>
    <span style="font-size:0.95rem; color:#555;">Page ${data.page} of ${data.pages} (${data.total} tasks)</span>
    <button class="btn" ${data.page >= data.pages ? 'disabled' : ''} onclick="changeTaskPage(1)">Next</button>
  `;
}

window.changeTaskPage = (delta) => { taskPage = Math.max(1, taskPage + delta); loadTasks(); };

window.markDone = async(id, newStatus)=>{ 
  const res=await apiFetch(`/tasks/${id}`, 'PUT', {status:newStatus}); 
  if(!res.success){ alert(res.message); return; } 
  loadTasks(); 
};

window.removeTask = async(id)=>{ 
  if(!confirm('Remove this task?')) return; 
  const res=await apiFetch(`/tasks/${id}`, 'DELETE'); 
  if(!res.success){ alert(res.message); return; } 
  loadTasks(); 
};

document.getElementById('add-task').onclick = async()=>{ 
  const title = document.getElementById('task-title').value.trim(); 
  const deadline = document.getElementById('task-deadline').value;
  const priority = document.getElementById('task-priority').value;
  if(!title||!deadline){ alert('Title and deadline required'); return; } 
  const res=await apiFetch('/tasks','POST',{title,deadline,priority}); 
  if(!res.success){ alert(res.message); return; } 
  document.getElementById('task-title').value=''; 
  document.getElementById('task-deadline').value=''; 
  document.getElementById('task-priority').value='medium';
  taskPage = 1;
  const msg = document.createElement('p');
  msg.id='task-msg';
  loadTasks();
  showMsg(msg, 'Task added successfully');
};

loadTasks();
</script>
</body>
</html>
