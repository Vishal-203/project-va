<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI Assistant | AI Study Assistant</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="navbar"><div>AI Study Assistant</div><div><a href="dashboard.html">Dashboard</a><a href="profile.html">Profile</a><a href="notebook.html">Notebook</a><a href="planner.html">Planner</a><a href="#" id="logout">Logout</a></div></div>
<div class="container">
<h1>AI Study Assistant</h1>
<div class="card">
  <h3>Use Uploaded File</h3>
  <p>Select a file uploaded on the Notebook page to use as AI context.</p>
  <select id="file-select" class="input-field">
    <option value="">-- No file selected --</option>
  </select>
  <button class="btn" id="refresh-files">Refresh Files</button>
  <p id="file-status" style="font-size:0.9rem; margin-top:0.5rem;"></p>
</div>
<div class="card"><h3>Ask Question</h3><textarea id="question" class="input-field" rows="3" placeholder="Ask any academic question..."></textarea><button class="btn" id="ask-btn">Get Answer</button><p id="answer"></p></div>
<div class="card"><h3>Summarize Notes</h3><textarea id="summary-text" class="input-field" rows="3" placeholder="Paste your notes..."></textarea><button class="btn" id="summarize-btn">Summarize</button><button class="btn" id="summarize-file-btn">Summarize Selected File</button><p id="summary"></p></div>
<div class="card"><h3>Generate Quiz</h3><input id="quiz-topic" class="input-field" placeholder="Enter topic" /><button class="btn" id="quiz-btn">Generate Quiz</button><pre id="quiz"></pre></div>
</div>
<script src="app.js"></script>
<script>
requireAuth();
initDarkMode();
document.getElementById('logout').onclick = () => {clearToken(); localStorage.removeItem('user'); window.location='index.html';};

async function display(eid, endpoint, payload, btn){
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Loading...';
  }
  const out = document.getElementById(eid);
  out.textContent = '';
  const res = await apiFetch(endpoint, 'POST', payload);
  if (btn) {
    btn.disabled = false;
    btn.textContent = endpoint === '/ai/ask' ? 'Get Answer' : endpoint === '/ai/summarize' ? 'Summarize' : 'Generate Quiz';
  }
  if(!res.success){ out.innerHTML = `<span style="color:red">${res.message}</span>`; return; }
  const data = res.data.answer || res.data.summary || res.data.quiz;
  out.style.whiteSpace = 'pre-wrap';
  out.style.backgroundColor = '#f9f9f9';
  out.style.padding = '1rem';
  out.style.borderRadius = '6px';
  out.style.marginTop = '0.5rem';
  out.textContent = data;
}

async function loadFileOptions() {
  const select = document.getElementById('file-select');
  const status = document.getElementById('file-status');
  const res = await apiFetch('/files');
  select.innerHTML = '<option value="">-- No file selected --</option>';
  if (!res.success || !Array.isArray(res.data) || res.data.length === 0) {
    status.textContent = 'No uploaded files found. Upload files from Notebook.';
    return;
  }
  res.data.forEach(file => {
    const option = document.createElement('option');
    option.value = file.id;
    option.textContent = `${file.filename} (${(file.size/1024).toFixed(1)} KB)`;
    select.appendChild(option);
  });
  status.textContent = `${res.data.length} uploaded file(s) available.`;
}

function getSelectedFileId() {
  return document.getElementById('file-select').value || null;
}

document.getElementById('ask-btn').onclick = async function() {
  const question = document.getElementById('question').value.trim();
  if(!question){ alert('Please ask a question'); return; }
  const fileId = getSelectedFileId();
  display('answer','/ai/ask', fileId ? { question, file_id: fileId } : { question }, this);
};

document.getElementById('summarize-btn').onclick = async function() {
  const text = document.getElementById('summary-text').value.trim();
  if(!text){ alert('Please enter text to summarize or select a file to summarize'); return; }
  display('summary','/ai/summarize',{text}, this);
};

document.getElementById('summarize-file-btn').onclick = async function() {
  const fileId = getSelectedFileId();
  if(!fileId){ alert('Please select a file to summarize'); return; }
  display('summary','/ai/summarize',{file_id: fileId}, this);
};

document.getElementById('quiz-btn').onclick = async function() { 
  const topic = document.getElementById('quiz-topic').value.trim();
  if(!topic){ alert('Please enter a topic'); return; }
  display('quiz','/ai/quiz',{topic}, this);
};

document.getElementById('refresh-files').onclick = loadFileOptions;

loadFileOptions();
</script>
</body>
</html>
