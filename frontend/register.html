<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Study Assistant - Register</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="navbar"><div>AI Study Assistant</div><div><a href="index.html">Login</a></div></div>
<div class="container">
<div class="card">
<h2>Register</h2>
<p id="register-msg" style="color:red"></p>
<input id="name" class="input-field" placeholder="Full Name" />
<input id="email" class="input-field" placeholder="Email" type="email" />
<input id="password" class="input-field" placeholder="Password" type="password" />
<button class="btn" id="register-btn">Register</button>
</div>
</div>
<script src="app.js"></script>
<script>
const registerBtn = document.getElementById('register-btn');
registerBtn.onclick = async () => {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const result = await apiFetch('/auth/register', 'POST', {name, email, password});
  if(!result.success){ showMsg(document.getElementById('register-msg'), result.message); return; }
  window.location.href = 'index.html';
};
</script>
</body>
</html>
